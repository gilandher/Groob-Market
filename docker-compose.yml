version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: groob_postgres
    restart: always
    environment:
      POSTGRES_DB: groob_market
      POSTGRES_USER: groob_user
      POSTGRES_PASSWORD: groob_password
    ports:
      - "5433:5432"
    volumes:
      - groob_db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groob-market-backend
    restart: always
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 config.wsgi:application
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: groob-market-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  groob_db_data:
